<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFEZONE | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-image: url('images/iloilo.jpg');
            background-size: cover;
            background-position: center 60%;
            background-attachment: fixed;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            z-index: -1;
        }
        
        .register-container {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="register-container bg-white rounded-lg shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600">SAFEZONE</h1>
            <p class="text-gray-600 mt-2">Admin Registration</p>
        </div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="mb-6">
                <label for="fullname" class="block text-gray-700 font-semibold mb-2">Full Name</label>
                <input 
                    type="text" 
                    id="fullname" 
                    name="fullname" 
                    required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                    placeholder="Enter your full name"
                >
            </div>

            <div class="mb-6">
                <label for="email" class="block text-gray-700 font-semibold mb-2">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                    placeholder="Enter your email"
                >
            </div>

            <div class="mb-6">
                <label for="username" class="block text-gray-700 font-semibold mb-2">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                    placeholder="Choose a username"
                >
            </div>

            <div class="mb-6">
                <label for="password" class="block text-gray-700 font-semibold mb-2">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                    placeholder="Create a password (6 characters)"
                >
            </div>

            <div class="mb-6">
                <label for="confirm-password" class="block text-gray-700 font-semibold mb-2">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirm-password" 
                    name="confirm-password" 
                    required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                    placeholder="Confirm password"
                >
            </div>

            <label class="mb-4 flex items-center gap-2 text-sm text-gray-700">
                <input
                    type="checkbox"
                    class="show-password-toggle h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500"
                    data-targets="password,confirm-password"
                >
                Show password
            </label>

            <div id="errorMessage" class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg hidden">
                <span id="errorText">Error message here</span>
            </div>

            <div id="successMessage" class="mb-4 p-3 bg-green-100 text-green-700 rounded-lg hidden">
                Account created successfully! Redirecting to login...
            </div>

            <button 
                type="submit" 
                id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200 active:scale-95"
            >
                Create Account
            </button>
        </form>

        <div class="mt-4 text-center">
            <p class="text-gray-600 text-sm">Already have an account? 
                <a href="login.html" class="text-blue-600 font-semibold hover:text-blue-700">Login here</a>
            </p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
