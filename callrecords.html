<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFEZONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="auth.js"></script>
    <style>
        body {
            background-image: url('images/iloilo.jpg');
            background-size: cover;
            background-position: center 60%;
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            z-index: -1;
        }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar -->
    <nav class="w-64 bg-white50/70 backdrop-blur fixed h-full flex flex-col rounded-r-2xl overflow-hidden">
        <div class="flex items-center gap-3 text-white text-xl font-bold px-6 py-6 border-b border-white/30">
            <img src="images/logo.png" alt="" class="w-20 h-20 shrink-0 object-contain" onerror="this.style.visibility='hidden'">
            SAFEZONE
        </div>
        <ul class="space-y-1 mt-4">
            <li>
                <a href="index.html" class="flex items-center gap-3 text-white font-bold hover:bg-gray-400 px-8 py-4">
                    <img src="images/dashboard.png" alt="" class="w-5 h-5 shrink-0 object-contain" onerror="this.style.visibility='hidden'">
                    Dashboard
                </a>
            </li>
            <li>
                <a href="callrecords.html" class="flex items-center gap-3 text-white font-bold bg-gray-600 px-8 py-4">
                    <img src="images/report.png" alt="" class="w-5 h-5 shrink-0 object-contain" onerror="this.style.visibility='hidden'">
                    Call Records
                </a>
            </li>
        </ul>

        <!-- Call Status Box -->
        <div class="mt-auto border-t border-white/30 p-4">
            <div class="bg-blue-800/50 rounded-xl p-4 text-center">
                <p id="status" class="text-white/60 text-sm">Call not Active.</p>
            </div>
        </div>
        
        <!-- User Info & Logout -->
        <div class="border-t border-white/30 pt-4 px-4 pb-4">
            <p class="text-white/70 text-xs mb-3">Logged in as: <span id="userDisplay" class="font-semibold text-white">Admin</span></p>
            <button onclick="logout()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg transition">
                Logout
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 ml-64 p-10">
        <div class="bg-gray-100 rounded-lg p-10 mt-50 min-h-[calc(100vh-200px)] border border-gray-100">
            <h1 class="text-2xl font-semibold text-gray-800 mb-2">Records</h1>
            <p class="text-gray-600 mb-6">View and manage your reports here.</p>

            <!-- Filter Buttons -->
            <div class="flex gap-3 mb-6">
                <button onclick="filterBy('all')" id="btn-all"
                    class="filter-btn px-4 py-2 rounded-full text-sm font-medium border transition-colors bg-blue-500 text-white border-blue-500">
                    All
                </button>
                <button onclick="filterBy('Police')" id="btn-Police"
                    class="filter-btn px-4 py-2 rounded-full text-sm font-medium border transition-colors bg-white text-gray-600 border-gray-300 hover:border-blue-400">
                    Police
                </button>
                <button onclick="filterBy('Fire')" id="btn-Fire"
                    class="filter-btn px-4 py-2 rounded-full text-sm font-medium border transition-colors bg-white text-gray-600 border-gray-300 hover:border-blue-400">
                    Fire
                </button>
                <button onclick="filterBy('Medic')" id="btn-Medic"
                    class="filter-btn px-4 py-2 rounded-full text-sm font-medium border transition-colors bg-white text-gray-600 border-gray-300 hover:border-blue-400">
                    Medic
                </button>
            </div>

            <!-- Output -->
            <div id="output" class="text-gray-700">
                <p class="text-gray-400">Loading...</p>
            </div>
        </div>
    </main>

    <!-- Image Preview Modal -->
    <div id="modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50" onclick="closeModal()">
        <div class="relative max-w-2xl w-full mx-4" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute -top-10 right-0 text-white text-sm hover:text-gray-300">✕ Close</button>
            <img id="modal-img" src="" class="w-full rounded-lg shadow-xl" />
        </div>
    </div>

    <script>
        function getImageUrl(path) {
            if (!path) return null;
            if (path.startsWith('http')) return path;

            const supabaseUrl = 'https://zjedyulcrxcttbukbynh.supabase.co';
            return `${supabaseUrl}/storage/v1/object/public/report-images/${path}`;
        }

        function openModal(src) {
            document.getElementById('modal-img').src = src;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }

        const agencyLocations = {
            Police: [
                ["PS1 City Proper", 10.701501994092405, 122.56369039944839],
                ["PS2 La Paz", 10.70552222109631, 122.56549995693831],
                ["PS3 Jaro", 10.71560226623802, 122.56266469623272],
                ["Molo Police Station", 10.698346304433658, 122.55105476464729],
                ["PS5 Mandurriao", 10.71683400704982, 122.53648059623264],
                ["Arevalo Police Station", 10.68890021276814, 122.51886825833218],
                ["PS7 Lapuz", 10.693878433584727, 122.55874469935698],
                ["Sambag Police Assistant", 10.742333401995415, 122.5409438842518],
                ["Ungka Police Station", 10.747512542219782, 122.54008363707585],
                ["ICPO Police Station 9", 10.7272054892569, 122.56710895228002],
                ["ICPO Police Station 10", 10.70553584277189, 122.55517513417514]
            ],
            Fire: [
                ["La Paz Fire Sub-Station", 10.712651852092284, 122.57295111469945],
                ["Federation Iloilo Fire Station", 10.698697241164309, 122.57076622219913],
                ["BFP Iloilo", 10.690705849929284, 122.58144791800282],
                ["Bo. Obrero Fire Sub-Station", 10.702275407727985, 122.59067301967075],
                ["Mandurriao Fire Sub-Station", 10.719211489646474, 122.53920666146492],
                ["Arevalo Fire Sub-Station", 10.688797426748417, 122.51626529021178],
                ["Sto. Nino Sur Fire Sub-Station", 10.68223713089546, 122.5099533777009],
                ["BFP Jaro", 10.72744065268221, 122.56251218153137],
                ["Ungka Fire Sub-Station", 10.74690941039231, 122.53931659330536],
                ["Old Molo Fire Station", 10.697030999439814, 122.5488881609591],
                ["San Isidro Fire Sub-Station", 10.736444550002995, 122.5458557423291]
            ],
            Medic: [
                ["Western Visayas Medical Center (Public)", 10.718885489071287, 122.54193891896666],
                ["Iloilo Mission Hospital", 10.714817707214994, 122.56058274040979],
                ["St. Paul's Hospital Iloilo", 10.702011896133618, 122.56694877109325],
                ["Iloilo Doctors' Hospital", 10.696804152759018, 122.55440768089073],
                ["The Medical City Iloilo", 10.699644543003238, 122.54277137544258],
                ["West Visayas State University Medical Center", 10.717168244196454, 122.56120580362972],
                ["QualiMed Hospital Iloilo", 10.706542561402188, 122.54782241379408],
                ["Medicus Medical Center", 10.702756754480117, 122.55224702393059],
                ["AMOSUP Seamen's Hospital", 10.714828158629505, 122.53455543124073]
            ]
        };

        function getReportCategory(category) {
            const value = String(category || '').toLowerCase().trim();
            if (value === 'medic' || value === 'medical' || value === 'hospital') return 'Medic';
            if (value === 'fire') return 'Fire';
            if (value === 'police') return 'Police';
            return null;
        }

        function calculateDistanceKm(lat1, lng1, lat2, lng2) {
            const radiusKm = 6371;
            const toRadians = degrees => degrees * Math.PI / 180;
            const dLat = toRadians(lat2 - lat1);
            const dLng = toRadians(lng2 - lng1);
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRadians(lat1)) * Math.cos(toRadians(lat2)) *
                Math.sin(dLng / 2) ** 2;

            return radiusKm * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function formatDistance(distanceKm) {
            if (!Number.isFinite(distanceKm)) return '';
            return distanceKm < 1
                ? `${Math.round(distanceKm * 1000)} m away`
                : `${distanceKm.toFixed(2)} km away`;
        }

        function getNearestAgency(category, lat, lng) {
            const agencyType = getReportCategory(category);
            const latitude = Number(lat);
            const longitude = Number(lng);

            if (!agencyType || !Number.isFinite(latitude) || !Number.isFinite(longitude)) {
                return null;
            }

            return agencyLocations[agencyType]
                .map(([name, agencyLat, agencyLng]) => ({
                    type: agencyType,
                    name,
                    distanceKm: calculateDistanceKm(latitude, longitude, agencyLat, agencyLng)
                }))
                .sort((a, b) => a.distanceKm - b.distanceKm)[0] || null;
        }

        async function filterBy(service) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-blue-500', 'text-white', 'border-blue-500');
                btn.classList.add('bg-white', 'text-gray-600', 'border-gray-300');
            });
            const active = document.getElementById('btn-' + service);
            if (active) {
                active.classList.add('bg-blue-500', 'text-white', 'border-blue-500');
                active.classList.remove('bg-white', 'text-gray-600', 'border-gray-300');
            }

            document.getElementById('output').innerHTML = '<p class="text-gray-400">Loading...</p>';

            if (!window.supabaseClient) {
                document.getElementById('output').innerHTML = '<p class="text-red-500">Error: Supabase client is not loaded.</p>';
                return;
            }

            let query = window.supabaseClient.from('incidents').select('category, "description", created_at, image_url, latitude, longitude');
            if (service !== 'all') {
                query = query.eq('category', service);
            }

            const { data, error } = await query;

            if (error) {
                document.getElementById('output').innerHTML = '<p class="text-red-500">Error: ' + error.message + '</p>';
                return;
            }

            if (!data || data.length === 0) {
                document.getElementById('output').innerHTML = '<p class="text-gray-400">No reports found.</p>';
                return;
            }

            document.getElementById('output').innerHTML = data.map(row => {
                const imgUrl = getImageUrl(row.image_url);
                const suggestion = getNearestAgency(row.category, row.latitude, row.longitude);
                const suggestionSection = suggestion ? `
                    <div class="mt-3 rounded border border-blue-200 bg-blue-50 p-3">
                        <p class="text-xs font-semibold uppercase text-blue-700">Suggested nearest ${suggestion.type} agency</p>
                        <p class="text-sm font-semibold text-gray-800">${suggestion.name}</p>
                        <p class="text-xs text-gray-500">${formatDistance(suggestion.distanceKm)}</p>
                    </div>` : '';
                const imageSection = imgUrl ? `
                    <div class="mt-3">
                        <img 
                            src="${imgUrl}" 
                            alt="Incidents image"
                            class="w-full h-40 object-cover rounded cursor-pointer hover:opacity-90 transition-opacity"
                            onclick="openModal('${imgUrl}')"
                            onerror="this.style.display='none'"
                        />
                        <p class="text-xs text-gray-400 mt-1">Click image to enlarge</p>
                    </div>` : `<p class="text-xs text-gray-400 mt-3">No image attached</p>`;

                return `
                    <div class="bg-white p-4 rounded border mb-3">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-xs font-medium text-blue-500">${row.category || 'Unknown'}</span>
                            <span class="text-gray-400 text-xs">${row["created_at"] || ''}</span>
                        </div>
                        <p class="text-gray-800">${row.description || 'No description'}</p>
                        ${suggestionSection}
                        ${imageSection}
                    </div>
                `;
            }).join('');    
        }

        filterBy('all');
    </script>

</body>
</html>
