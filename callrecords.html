<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFEZONE | Call Records</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body {
            background-image: url('images/iloilo.jpg');
            background-size: cover;
            background-position: center 60%;
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            z-index: -1;
        }
    </style>
</head>
<body class="flex min-h-screen">
    <nav class="w-64 bg-white50/70 backdrop-blur fixed h-full flex flex-col rounded-r-2xl overflow-hidden">
        <div class="flex items-center gap-3 text-white text-xl font-bold px-6 py-6 border-b border-white/30">
            <img src="images/logo.png" alt="" class="w-20 h-20 shrink-0 object-cover rounded-full" onerror="this.style.visibility='hidden'">
            SAFEZONE
        </div>
        <ul class="space-y-1 mt-4">
            <li>
                <a href="index.html" onclick="event.preventDefault(); if (window.prepareAppNavigation) window.prepareAppNavigation(); window.location.href='index.html';" class="flex items-center gap-3 text-white font-bold hover:bg-gray-400 px-8 py-4">
                    <img src="images/dashboard.png" alt="" class="w-5 h-5 shrink-0 object-contain" onerror="this.style.visibility='hidden'">
                    Dashboard
                </a>
            </li>
            <li>
                <a href="reportrecords.html" onclick="event.preventDefault(); if (window.prepareAppNavigation) window.prepareAppNavigation(); window.location.href='reportrecords.html';" class="flex items-center gap-3 text-white font-bold hover:bg-gray-400 px-8 py-4">
                    <img src="images/report.png" alt="" class="w-5 h-5 shrink-0 object-contain" onerror="this.style.visibility='hidden'">
                    Report Records
                </a>
            </li>
            <li>
                <a href="callrecords.html" class="flex items-center gap-3 text-white font-bold bg-gray-600 px-8 py-4">
                    <img src="images/phone-call.png" alt="" class="w-5 h-5 shrink-0 object-contain" onerror="this.style.visibility='hidden'">
                    Call Records
                </a>
            </li>
        </ul>

        <div class="mt-auto border-t border-white/30 p-4">
            <div class="bg-blue-800/50 rounded-xl p-4 text-center">
                <div id="idleState">
                    <p class="text-white/60 text-sm">Waiting for call...</p>
                </div>
                <div id="incomingState" class="hidden">
                    <p class="text-white text-sm font-medium mb-3">Incoming call</p>
                    <div class="flex justify-center gap-4">
                        <div class="flex flex-col items-center gap-1">
                            <button onclick="acceptCall()" class="w-11 h-11 rounded-full bg-green-500 hover:bg-green-400 active:scale-95 flex items-center justify-center transition-transform">
                                <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C11.4 21 3 12.6 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
                            </button>
                            <span class="text-green-300 text-xs">Accept</span>
                        </div>
                        <div class="flex flex-col items-center gap-1">
                            <button onclick="rejectCall()" class="w-11 h-11 rounded-full bg-red-500 hover:bg-red-400 active:scale-95 flex items-center justify-center transition-transform">
                                <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.1.3-4.5.7v3.1c0 .4-.2.8-.5 1-.8.5-1.6 1.1-2.2 1.8-.3.3-.8.3-1.1 0L1.1 13c-.3-.3-.3-.8 0-1.1C3.4 9.4 7.5 8 12 8s8.6 1.4 10.9 3.9c.3.3.3.8 0 1.1l-2.6 2.6c-.3.3-.8.3-1.1 0-.7-.7-1.4-1.3-2.2-1.8-.3-.2-.5-.6-.5-1V9.7C15.1 9.3 13.6 9 12 9z"/></svg>
                            </button>
                            <span class="text-red-300 text-xs">Reject</span>
                        </div>
                    </div>
                </div>
                <div id="activeState" class="hidden">
                    <p class="text-green-300 text-sm font-medium mb-1">Call active</p>
                    <p id="callTimer" class="text-white text-lg font-light tracking-widest mb-3">00:00</p>
                    <div class="flex flex-col items-center gap-1">
                        <button onclick="endCall()" class="w-11 h-11 rounded-full bg-red-500 hover:bg-red-400 active:scale-95 flex items-center justify-center transition-transform">
                            <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.1.3-4.5.7v3.1c0 .4-.2.8-.5 1-.8.5-1.6 1.1-2.2 1.8-.3.3-.8.3-1.1 0L1.1 13c-.3-.3-.3-.8 0-1.1C3.4 9.4 7.5 8 12 8s8.6 1.4 10.9 3.9c.3.3.3.8 0 1.1l-2.6 2.6c-.3.3-.8.3-1.1 0-.7-.7-1.4-1.3-2.2-1.8-.3-.2-.5-.6-.5-1V9.7C15.1 9.3 13.6 9 12 9z"/></svg>
                        </button>
                        <span class="text-red-300 text-xs">End Call</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="border-t border-white/30 pt-4 px-4 pb-4">
            <p class="text-white/70 text-xs mb-3">Logged in as: <span id="userDisplay" class="font-semibold text-white">Admin</span></p>
            <button onclick="logout()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg transition">
                Logout
            </button>
        </div>
    </nav>

    <main class="flex-1 ml-64 p-6 lg:p-10">
        <div class="bg-slate-50/95 backdrop-blur rounded-xl p-5 sm:p-6 lg:p-8 min-h-[calc(100vh-80px)] border border-white/70 shadow-2xl shadow-black/10">
            <div class="flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between mb-6">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wider text-blue-600">Call tracking</p>
                    <h1 class="text-2xl sm:text-3xl font-bold text-slate-900">Call Records</h1>
                </div>
                <div class="flex items-center gap-2">
                    <p id="callRecordCount" class="text-sm font-medium text-slate-500">Loading calls...</p>
                    <button onclick="clearCallRecords()" class="bg-white text-black font-semibold py-2 px-4 rounded-lg transition">
                        Clear Records
                    </button>
                </div>
            </div>

            <section class="rounded-xl border border-slate-200 bg-white shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-slate-200">
                        <thead class="bg-slate-100/80">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-bold uppercase tracking-wide text-slate-500">Date</th>
                                <th class="px-4 py-3 text-left text-xs font-bold uppercase tracking-wide text-slate-500">Time</th>
                                <th class="px-4 py-3 text-left text-xs font-bold uppercase tracking-wide text-slate-500">Duration</th>
                            </tr>
                        </thead>
                        <tbody id="callRecordsBody" class="divide-y divide-slate-100 bg-white">
                            <tr>
                                <td colspan="3" class="px-4 py-8 text-center text-slate-400">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script>
        const STORAGE_KEY = 'safezone_call_records';

        function getCallRecords() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            } catch (e) {
                return [];
            }
        }

        function formatDate(value) {
            if (!value) return '-';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '-';
            return new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).format(date);
        }

        function formatTime(value) {
            if (!value) return '-';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '-';
            return new Intl.DateTimeFormat('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }).format(date);
        }

        function formatDuration(seconds) {
            if (!Number.isFinite(Number(seconds)) || Number(seconds) <= 0) return '-';
            const mins = Math.floor(Number(seconds) / 60);
            const secs = Number(seconds) % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function renderCallRecords() {
            const records = getCallRecords();
            document.getElementById('callRecordCount').textContent = `${records.length} call${records.length === 1 ? '' : 's'}`;

            if (!records.length) {
                document.getElementById('callRecordsBody').innerHTML = `
                    <tr>
                        <td colspan="3" class="px-4 py-8 text-center text-slate-400">No call records yet.</td>
                    </tr>
                `;
                return;
            }

            document.getElementById('callRecordsBody').innerHTML = records.map(record => `
                <tr class="hover:bg-slate-50">
                    <td class="px-4 py-4 text-sm font-medium text-slate-800">${escapeHtml(formatDate(record.receivedAt || record.timestamp))}</td>
                    <td class="px-4 py-4 text-sm text-slate-600">${escapeHtml(formatTime(record.receivedAt || record.timestamp))}</td>
                    <td class="px-4 py-4 text-sm text-slate-700">${escapeHtml(formatDuration(record.durationSeconds))}</td>
                </tr>
            `).join('');
        }

        function clearCallRecords() {
            localStorage.removeItem(STORAGE_KEY);
            renderCallRecords();
        }

        window.addEventListener('call-records-updated', renderCallRecords);
        document.addEventListener('DOMContentLoaded', renderCallRecords);
    </script>
    <audio id="remoteAudio" autoplay playsinline></audio>

    <script src="webrtc.js"></script>
</body>
</html>
