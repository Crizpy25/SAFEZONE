<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFEZONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar -->
    <nav class="w-64 bg-blue-500 fixed h-full flex flex-col">
        <div class="text-white text-xl font-bold px-8 py-8 border-b border-white/30">
            SAFEZONE
        </div>
        <ul class="space-y-1 mt-4">
            <li>
                <a href="index.html" class="block text-white bg-blue-700 px-8 py-4">
                    Dashboard
                </a>
            </li>
            <li>
                <a href="callrecords.html" class="block text-white hover:bg-blue-600 px-8 py-4">
                    Call Records
                </a>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 ml-64 bg-white p-6 relative">
        <h1 class="text-2xl font-bold mb-1">Dashboard</h1>
        <p id="status" class="text-sm text-gray-500 mb-3">Waiting for call...</p>

        <div id="map" class="w-full h-[80vh] rounded-lg"></div>

        <!-- Filter Buttons -->
        <div class="absolute top-20 right-10 z-[1000] flex flex-col gap-2">
            <button onclick="togglePolice()" class="bg-blue-700 hover:bg-blue-600 text-white px-4 py-2 rounded-lg shadow flex items-center gap-2">
                <span>🚔</span> Police
            </button>
            <button onclick="toggleFire()" class="bg-red-700 hover:bg-red-600 text-white px-4 py-2 rounded-lg shadow flex items-center gap-2">
                <span>🔥</span> Fire
            </button>
            <button onclick="toggleHospital()" class="bg-green-700 hover:bg-green-600 text-white px-4 py-2 rounded-lg shadow flex items-center gap-2">
                <span>🏥</span> Hospital
            </button>
            <button onclick="showAllLayers()" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg shadow flex items-center gap-2">
                <span>👁️</span> Show All
            </button>
            <button onclick="refreshLocation()" 
            class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg shadow flex items-center gap-2">
            📍 Refresh Location
        </button>

        </div>

        <!-- Call Banner -->
        <div id="callBanner" class="hidden absolute bottom-6 left-1/2 -translate-x-1/2 z-[1000]
             bg-green-500 text-white px-6 py-3 rounded-full shadow-lg text-sm font-medium">
            📞 Call Active
        </div>
    </main>

    <!-- Audio -->
    <audio id="remoteAudio" autoplay playsinline></audio>

    <!-- Scripts -->
    <script src="map.js"></script>
    <script src="webrtc.js"></script>
</body>
</html>
