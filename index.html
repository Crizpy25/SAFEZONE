<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFEZONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <style>
        body {
            background-image: url('images/iloilo.jpg');
            background-size: cover;
            background-position: center 60%;
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            z-index: -1;
        }
    </style>
</head>

<body class="flex min-h-screen">

    <!-- Sidebar -->
    <nav class="w-64 bg-white50/70 backdrop-blur fixed h-full flex flex-col rounded-r-2xl overflow-hidden">
        <div class="flex items-center gap-3 text-white text-xl font-bold px-6 py-6 border-b border-white/30">
            <img src="images/logo.png" alt="" class="w-20 h-20 shrink-0 object-contain" onerror="this.style.visibility='hidden'">
            SAFEZONE
        </div>  
        <ul class="space-y-1 mt-4">
            <li>
                <a href="index.html" class="flex items-center gap-3 text-white font-bold bg-gray-600 px-8 py-4">
                    <img src="images/dashboard.png" alt="" class="w-5 h-5 shrink-0 object-contain" onerror="this.style.visibility='hidden'">
                    Dashboard
                </a>
            </li>
            <li>
                <a href="callrecords.html" class="flex items-center gap-3 text-white font-bold hover:bg-gray-400 px-8 py-4">
                    <img src="images/report.png" alt="" class="w-5 h-5 shrink-0 object-contain" onerror="this.style.visibility='hidden'">
                    Call Records
                </a>
            </li>
        </ul>

        <!-- Call status -->
        <div class="mt-auto border-t border-white/30 p-4">
            <div class="bg-blue-800/50 rounded-xl p-4 text-center">

                <!-- Idle -->
                <div id="idleState">
                    <p class="text-white/60 text-sm">Waiting for call...</p>
                </div>

                <!-- Incoming -->
                <div id="incomingState" class="hidden">
                    <p class="text-white text-sm font-medium mb-3">Incoming call</p>
                    <div class="flex justify-center gap-4">
                        <div class="flex flex-col items-center gap-1">
                            <button onclick="acceptCall()"
                                class="w-11 h-11 rounded-full bg-green-500 hover:bg-green-400 active:scale-95 flex items-center justify-center transition-transform">
                                <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24">
                                    <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C11.4 21 3 12.6 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
                                </svg>
                            </button>
                            <span class="text-green-300 text-xs">Accept</span>
                        </div>
                        <div class="flex flex-col items-center gap-1">
                            <button onclick="rejectCall()"
                                class="w-11 h-11 rounded-full bg-red-500 hover:bg-red-400 active:scale-95 flex items-center justify-center transition-transform">
                                <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24">
                                    <path d="M12 9c-1.6 0-3.1.3-4.5.7v3.1c0 .4-.2.8-.5 1-.8.5-1.6 1.1-2.2 1.8-.3.3-.8.3-1.1 0L1.1 13c-.3-.3-.3-.8 0-1.1C3.4 9.4 7.5 8 12 8s8.6 1.4 10.9 3.9c.3.3.3.8 0 1.1l-2.6 2.6c-.3.3-.8.3-1.1 0-.7-.7-1.4-1.3-2.2-1.8-.3-.2-.5-.6-.5-1V9.7C15.1 9.3 13.6 9 12 9z"/>
                                </svg>
                            </button>
                            <span class="text-red-300 text-xs">Reject</span>
                        </div>
                    </div>
                </div>

                
                <div id="activeState" class="hidden">
                    <p class="text-green-300 text-sm font-medium mb-1">Call active</p>
                    <p id="callTimer" class="text-white text-lg font-light tracking-widest mb-3">00:00</p>
                    <div class="flex flex-col items-center gap-1">
                        <button onclick="endCall()"
                            class="w-11 h-11 rounded-full bg-red-500 hover:bg-red-400 active:scale-95 flex items-center justify-center transition-transform">
                            <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24">
                                <path d="M12 9c-1.6 0-3.1.3-4.5.7v3.1c0 .4-.2.8-.5 1-.8.5-1.6 1.1-2.2 1.8-.3.3-.8.3-1.1 0L1.1 13c-.3-.3-.3-.8 0-1.1C3.4 9.4 7.5 8 12 8s8.6 1.4 10.9 3.9c.3.3.3.8 0 1.1l-2.6 2.6c-.3.3-.8.3-1.1 0-.7-.7-1.4-1.3-2.2-1.8-.3-.2-.5-.6-.5-1V9.7C15.1 9.3 13.6 9 12 9z"/>
                            </svg>
                        </button>
                        <span class="text-red-300 text-xs">End Call</span>
                    </div>
                </div>

            </div>
        </div>
        
        <!-- User Info & Logout -->
        <div class="border-t border-white/30 pt-4 px-4 pb-4">
            <p class="text-white/70 text-xs mb-3">Logged in as: <span id="userDisplay" class="font-semibold text-white">Admin</span></p>
            <button onclick="logout()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg transition">
                Logout
            </button>
        </div>
    </nav>

    <!-- ── Main ── -->
   <main class="flex-1 ml-64 p-6">
    <h1 class="text-4xl text-white text-center font-bold mb-1">Dashboard</h1>


    <!-- MAP WRAPPER -->
    <div class="relative w-full h-[80vh] rounded-lg overflow-hidden">

        <div id="map" class="w-full h-full"></div>

        <!-- Filter Buttons INSIDE MAP -->
        <div class="absolute top-4 right-4 z-[1000] flex flex-col gap-2">

            <button onclick="togglePolice()" class="bg-blue-700 hover:bg-blue-400 text-white px-4 py-2 rounded-lg shadow flex items-center gap-2">
                Police Stations
            </button>

            <button onclick="toggleFire()" class="bg-red-800 hover:bg-red-400 text-white px-4 py-2 rounded-lg shadow flex items-center gap-2">
                Fire Stations
            </button>

            <button onclick="toggleHospital()" class="bg-green-800 hover:bg-green-400 text-white px-4 py-2 rounded-lg shadow flex items-center gap-2">
                 Hospitals
            </button>

            <button onclick="showAllLayers()" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg shadow flex items-center gap-2">
                Show/Hide All
            </button>


        </div>
    </div>

    </main>


    <audio id="remoteAudio" autoplay playsinline></audio>

    <script src="map.js"></script>
    <script src="webrtc.js"></script>

    
</body>
</html>
